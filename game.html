<!DOCTYPE html> 

<html lang="en"> 

<head> 

    <meta charset="UTF-8"> 

    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 

    <title>Weasel Horror: Escape the Forest</title> 

    <style> 

        body { 

            margin: 0; 

            padding: 20px; 

            background: #0a0a0a; 

            display: flex; 

            justify-content: center; 

            align-items: center; 

            min-height: 100vh; 

            font-family: 'Arial', sans-serif; 

        } 

         

        .game-container { 

            background: #1a1a1a; 

            padding: 20px; 

            border-radius: 10px; 

            box-shadow: 0 4px 30px rgba(0,0,0,0.8); 

            border: 2px solid #333; 

        } 

         

        canvas { 

            border: 3px solid #8B0000; 

            background: #000; 

            display: block; 

            border-radius: 5px; 

        } 

         

        .controls { 

            color: #aaa; 

            text-align: center; 

            margin-top: 15px; 

            font-size: 12px; 

        } 

         

        .controls h3 { 

            margin: 0 0 10px 0; 

            color: #ff4444; 

        } 

         

        .key { 

            background: #8B0000; 

            color: white; 

            padding: 4px 8px; 

            border-radius: 3px; 

            font-weight: bold; 

            margin: 0 2px; 

        } 

    </style> 

</head> 

<body> 

    <div class="game-container"> 

        <canvas id="gameCanvas" width="1000" height="600"></canvas> 

        <div class="controls"> 

            <h3>⚠️ ESCAPE THE WEASEL! ⚠️</h3> 

            <p>Use <span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> to move • Collect <span class="key">⭐</span> for speed boost (3s) • Reach the <span class="key">🚪</span> to escape!</p> 

        </div> 

    </div> 

 

    <script> 

        class HorrorGame { 

            constructor() { 

                this.canvas = document.getElementById('gameCanvas'); 

                this.ctx = this.canvas.getContext('2d'); 

                 

                // Game settings 

                this.gameWidth = this.canvas.width; 

                this.gameHeight = this.canvas.height; 

                 

                // World map (larger than visible area for first-person effect) 

                this.worldWidth = 4000; 

                this.worldHeight = 4000; 

                 

                // Player 

                this.player = { 

                    x: 1000, 

                    y: 1000, 

                    radius: 30, 

                    baseSpeed: 6, 

                    speed: 6, 

                    angle: 0, 

                    speedBoostEnd: 0 

                }; 

                 

                // Weasel creature (chasing enemy) 

                this.weasel = { 

                    x: 200, 

                    y: 200, 

                    radius: 40, 

                    speed: 4, 

                    image: null, 

                    imageLoaded: false 

                }; 

                 

                // Exit/Door (positioned on load) 

                this.exit = { 

                    x: 0, 

                    y: 0, 

                    width: 80, 

                    height: 120 

                }; 

                 

                // Collectibles for speed boost 

                this.collectibles = []; 

                this.lastCollectibleSpawn = 0; 

                this.collectibleSpawnDelay = 5000; // Spawn every 5 seconds 

                 

                // Input 

                this.keys = { w: false, a: false, s: false, d: false }; 

                 

                // Game state 

                this.gameState = 'playing'; // 'playing', 'won', 'lost' 

                this.gameStartTime = Date.now(); 

                this.gameEndTime = null; 

                this.distance = 0; 

                 

                this.init(); 

            } 

             

            init() { 

                // Load weasel image 

                this.weasel.image = new Image(); 

                this.weasel.image.onload = () => { 

                    this.weasel.imageLoaded = true; 

                }; 

                this.weasel.image.onerror = () => { 

                    this.weasel.imageLoaded = false; 

                }; 

                this.weasel.image.src = 'weasel.png'; 

                 

                this.setupInputHandlers(); 

 

                // Start player in center of the world 

                this.player.x = this.worldWidth / 2; 

                this.player.y = this.worldHeight / 2; 

 

                // Place exit at a random position (not too close to player) 

                this.placeExitRandomly(); 

 

                this.gameLoop(); 

            } 

             

            setupInputHandlers() { 

                document.addEventListener('keydown', (e) => { 

                    const key = e.key.toLowerCase(); 

                    if (key === 'w') this.keys.w = true; 

                    if (key === 'a') this.keys.a = true; 

                    if (key === 's') this.keys.s = true; 

                    if (key === 'd') this.keys.d = true; 

                }); 

                 

                document.addEventListener('keyup', (e) => { 

                    const key = e.key.toLowerCase(); 

                    if (key === 'w') this.keys.w = false; 

                    if (key === 'a') this.keys.a = false; 

                    if (key === 's') this.keys.s = false; 

                    if (key === 'd') this.keys.d = false; 

                }); 

            } 

             

            update() { 

                if (this.gameState !== 'playing') return; 

                 

                // Handle player movement 

                let moveX = 0; 

                let moveY = 0; 

                 

                if (this.keys.w) moveY -= 1; 

                if (this.keys.s) moveY += 1; 

                if (this.keys.a) moveX -= 1; 

                if (this.keys.d) moveX += 1; 

                 

                // Normalize diagonal movement 

                if (moveX !== 0 || moveY !== 0) { 

                    const length = Math.sqrt(moveX * moveX + moveY * moveY); 

                    moveX /= length; 

                    moveY /= length; 

                     

                    // Update angle for rendering 

                    this.player.angle = Math.atan2(moveY, moveX); 

                     

                    // Apply speed boost if active 

                    const currentTime = Date.now(); 

                    if (currentTime < this.player.speedBoostEnd) { 

                        this.player.speed = this.player.baseSpeed * 1.8; // 80% speed increase 

                    } else { 

                        this.player.speed = this.player.baseSpeed; 

                    } 

                     

                    this.player.x += moveX * this.player.speed; 

                    this.player.y += moveY * this.player.speed; 

                } 

                 

                // Keep player in world bounds 

                this.player.x = Math.max(50, Math.min(this.worldWidth - 50, this.player.x)); 

                this.player.y = Math.max(50, Math.min(this.worldHeight - 50, this.player.y)); 

                 

                // Update weasel AI (chase player) 

                this.updateWeasel(); 

                 

                // Update collectibles 

                this.updateCollectibles(); 

                 

                // Spawn collectibles 

                const currentTime = Date.now(); 

                if (currentTime - this.lastCollectibleSpawn > this.collectibleSpawnDelay && this.collectibles.length < 5) { 

                    this.spawnCollectible(); 

                    this.lastCollectibleSpawn = currentTime; 

                } 

                 

                // Check collisions 

                this.checkCollisions(); 

                 

                // Calculate distance to exit 

                const exitCenterX = this.exit.x + this.exit.width / 2; 

                const exitCenterY = this.exit.y + this.exit.height / 2; 

                this.distance = Math.sqrt( 

                    Math.pow(exitCenterX - this.player.x, 2) +  

                    Math.pow(exitCenterY - this.player.y, 2) 

                ); 

            } 

             

            updateWeasel() { 

                // Simple AI: move towards player 

                const dx = this.player.x - this.weasel.x; 

                const dy = this.player.y - this.weasel.y; 

                const distance = Math.sqrt(dx * dx + dy * dy); 

                 

                if (distance > 0) { 

                    this.weasel.x += (dx / distance) * this.weasel.speed; 

                    this.weasel.y += (dy / distance) * this.weasel.speed; 

                } 

                 

                // Keep weasel in world bounds 

                this.weasel.x = Math.max(50, Math.min(this.worldWidth - 50, this.weasel.x)); 

                this.weasel.y = Math.max(50, Math.min(this.worldHeight - 50, this.weasel.y)); 

            } 

             

            spawnCollectible() { 

                const collectible = { 

                    x: Math.random() * (this.worldWidth - 100) + 50, 

                    y: Math.random() * (this.worldHeight - 100) + 50, 

                    radius: 15 

                }; 

                this.collectibles.push(collectible); 

            } 

             

            updateCollectibles() { 

                this.collectibles = this.collectibles.filter(c => { 

                    // Remove if too far from any relevant area 

                    return true; 

                }); 

            } 

 

            placeExitRandomly() { 

                const margin = 100; 

                const minDistanceFromPlayer = Math.max(this.gameWidth, this.gameHeight) * 0.8; 

                let x, y, dx, dy, dist; 

 

                // Try a few times to find a spot far enough from the player 

                for (let i = 0; i < 100; i++) { 

                    x = Math.random() * (this.worldWidth - this.exit.width - margin * 2) + margin; 

                    y = Math.random() * (this.worldHeight - this.exit.height - margin * 2) + margin; 

                    dx = (x + this.exit.width / 2) - this.player.x; 

                    dy = (y + this.exit.height / 2) - this.player.y; 

                    dist = Math.sqrt(dx * dx + dy * dy); 

                    if (dist >= minDistanceFromPlayer) break; 

                } 

 

                // Fallback to top-left if nothing suitable found 

                if (typeof x === 'undefined') { 

                    x = margin; 

                    y = margin; 

                } 

 

                this.exit.x = x; 

                this.exit.y = y; 

            } 

             

            draw() { 

                // Clear canvas 

                this.ctx.fillStyle = '#000'; 

                this.ctx.fillRect(0, 0, this.gameWidth, this.gameHeight); 

                 

                // Apply camera offset (center on player) 

                const cameraX = this.player.x - this.gameWidth / 2; 

                const cameraY = this.player.y - this.gameHeight / 2; 

                 

                this.ctx.save(); 

                this.ctx.translate(-cameraX, -cameraY); 

                 

                // Draw forest background 

                this.drawForest(cameraX, cameraY); 

                 

                // Draw collectibles 

                this.drawCollectibles(); 

                 

                // Draw exit/door 

                this.drawExit(); 

                 

                // Draw weasel 

                this.drawWeasel(); 

                 

                // Draw player (crosshair/indicator) 

                this.drawPlayer(); 

                 

                this.ctx.restore(); 

                 

                // Draw HUD 

                this.drawHUD(); 

                 

                // Draw game over screens 

                if (this.gameState === 'won') { 

                    this.drawWinScreen(); 

                } else if (this.gameState === 'lost') { 

                    this.drawLoseScreen(); 

                } 

            } 

             

            checkCollisions() { 

                // Check player-weasel collision (lose condition) 

                const dxWeasel = this.weasel.x - this.player.x; 

                const dyWeasel = this.weasel.y - this.player.y; 

                const distanceWeasel = Math.sqrt(dxWeasel * dxWeasel + dyWeasel * dyWeasel); 

                 

                if (distanceWeasel < this.player.radius + this.weasel.radius) { 

                    this.gameState = 'lost'; 

                    this.gameEndTime = Date.now(); 

                    return; 

                } 

                 

                // Check player-collectible collision 

                for (let i = this.collectibles.length - 1; i >= 0; i--) { 

                    const c = this.collectibles[i]; 

                    const dxCollect = c.x - this.player.x; 

                    const dyCollect = c.y - this.player.y; 

                    const distanceCollect = Math.sqrt(dxCollect * dxCollect + dyCollect * dyCollect); 

                     

                    if (distanceCollect < this.player.radius + c.radius) { 

                        this.collectibles.splice(i, 1); 

                        this.player.speedBoostEnd = Date.now() + 3000; // 3 second boost 

                    } 

                } 

                 

                // Check player-exit collision (win condition) 

                if (this.player.x > this.exit.x && this.player.x < this.exit.x + this.exit.width && 

                    this.player.y > this.exit.y && this.player.y < this.exit.y + this.exit.height) { 

                    this.gameState = 'won'; 

                    this.gameEndTime = Date.now(); 

                } 

            } 

             

            drawForest(cameraX, cameraY) { 

                // Forest floor - dark green/brown 

                this.ctx.fillStyle = '#1a3d1a'; 

                this.ctx.fillRect(cameraX, cameraY, this.gameWidth * 2, this.gameHeight * 2); 

                 

                // Tree-like pattern for forest atmosphere 

                for (let x = 0; x < this.worldWidth; x += 150) { 

                    for (let y = 0; y < this.worldHeight; y += 150) { 

                        // Tree shadows/obstacles 

                        this.ctx.fillStyle = '#0d2610'; 

                        this.ctx.fillRect(x, y, 50, 80); 

                        this.ctx.fillStyle = '#1a5c1a'; 

                        this.ctx.fillRect(x + 10, y - 20, 30, 40); 

                    } 

                } 

                 

                // Some random darker spots for atmosphere 

                this.ctx.fillStyle = 'rgba(0, 0, 0, 0.3)'; 

                for (let i = 0; i < 20; i++) { 

                    const x = (i * 173) % this.worldWidth; 

                    const y = (i * 241) % this.worldHeight; 

                    this.ctx.fillRect(x, y, 100, 100); 

                } 

            } 

             

            drawCollectibles() { 

                this.ctx.fillStyle = '#FFD700'; 

                this.ctx.strokeStyle = '#FFA500'; 

                this.ctx.lineWidth = 2; 

                 

                for (let collectible of this.collectibles) { 

                    // Star shape for collectible 

                    this.drawStar(collectible.x, collectible.y, 5, collectible.radius, collectible.radius * 0.6); 

                } 

            } 

             

            drawStar(cx, cy, spikes, outerRadius, innerRadius) { 

                let rot = Math.PI / 2 * 3; 

                let step = Math.PI / spikes; 

                 

                this.ctx.beginPath(); 

                this.ctx.moveTo(cx, cy - outerRadius); 

                for (let i = 0; i < spikes; i++) { 

                    this.ctx.lineTo(cx + Math.cos(rot) * outerRadius, cy + Math.sin(rot) * outerRadius); 

                    rot += step; 

                    this.ctx.lineTo(cx + Math.cos(rot) * innerRadius, cy + Math.sin(rot) * innerRadius); 

                    rot += step; 

                } 

                this.ctx.lineTo(cx, cy - outerRadius); 

                this.ctx.closePath(); 

                this.ctx.fill(); 

                this.ctx.stroke(); 

            } 

             

            drawExit() { 

                // Door frame 

                this.ctx.fillStyle = '#8B4513'; 

                this.ctx.fillRect(this.exit.x - 5, this.exit.y - 5, this.exit.width + 10, this.exit.height + 10); 

                 

                // Door 

                this.ctx.fillStyle = '#CD853F'; 

                this.ctx.fillRect(this.exit.x, this.exit.y, this.exit.width, this.exit.height); 

                 

                // Door details 

                this.ctx.fillStyle = '#FFD700'; 

                this.ctx.beginPath(); 

                this.ctx.arc(this.exit.x + this.exit.width - 15, this.exit.y + this.exit.height / 2, 8, 0, Math.PI * 2); 

                this.ctx.fill(); 

                 

                // Door label 

                this.ctx.fillStyle = '#fff'; 

                this.ctx.font = 'bold 16px Arial'; 

                this.ctx.textAlign = 'center'; 

                this.ctx.fillText('EXIT', this.exit.x + this.exit.width / 2, this.exit.y + this.exit.height / 2); 

            } 

             

            drawWeasel() { 

                if (this.weasel.imageLoaded && this.weasel.image.complete) { 

                    this.ctx.drawImage( 

                        this.weasel.image, 

                        this.weasel.x - this.weasel.radius, 

                        this.weasel.y - this.weasel.radius, 

                        this.weasel.radius * 2, 

                        this.weasel.radius * 2 

                    ); 

                } else { 

                    // Weasel placeholder - make it look menacing 

                    this.ctx.fillStyle = '#8B7355'; 

                    this.ctx.beginPath(); 

                    this.ctx.ellipse(this.weasel.x, this.weasel.y, this.weasel.radius, this.weasel.radius * 0.7, 0, 0, Math.PI * 2); 

                    this.ctx.fill(); 

                     

                    // Eyes - red and evil 

                    this.ctx.fillStyle = '#FF0000'; 

                    this.ctx.beginPath(); 

                    this.ctx.arc(this.weasel.x - 15, this.weasel.y - 10, 8, 0, Math.PI * 2); 

                    this.ctx.fill(); 

                    this.ctx.beginPath(); 

                    this.ctx.arc(this.weasel.x + 15, this.weasel.y - 10, 8, 0, Math.PI * 2); 

                    this.ctx.fill(); 

                     

                    // Teeth 

                    this.ctx.strokeStyle = '#FFF'; 

                    this.ctx.lineWidth = 2; 

                    this.ctx.beginPath(); 

                    this.ctx.moveTo(this.weasel.x - 10, this.weasel.y + 10); 

                    for (let i = 0; i < 5; i++) { 

                        this.ctx.lineTo(this.weasel.x - 10 + i * 4, this.weasel.y + 15); 

                        this.ctx.lineTo(this.weasel.x - 8 + i * 4, this.weasel.y + 10); 

                    } 

                    this.ctx.stroke(); 

                } 

            } 

             

            drawPlayer() { 

                // First-person crosshair 

                this.ctx.strokeStyle = '#00FF00'; 

                this.ctx.lineWidth = 2; 

                 

                // Center point 

                this.ctx.fillStyle = 'rgba(0, 255, 0, 0.5)'; 

                this.ctx.beginPath(); 

                this.ctx.arc(this.player.x, this.player.y, 5, 0, Math.PI * 2); 

                this.ctx.fill(); 

                 

                // Crosshair 

                this.ctx.beginPath(); 

                this.ctx.moveTo(this.player.x - 15, this.player.y); 

                this.ctx.lineTo(this.player.x - 25, this.player.y); 

                this.ctx.moveTo(this.player.x + 15, this.player.y); 

                this.ctx.lineTo(this.player.x + 25, this.player.y); 

                this.ctx.moveTo(this.player.x, this.player.y - 15); 

                this.ctx.lineTo(this.player.x, this.player.y - 25); 

                this.ctx.moveTo(this.player.x, this.player.y + 15); 

                this.ctx.lineTo(this.player.x, this.player.y + 25); 

                this.ctx.stroke(); 

            } 

             

            drawHUD() { 

                // Semi-transparent background for HUD 

                this.ctx.fillStyle = 'rgba(0, 0, 0, 0.6)'; 

                this.ctx.fillRect(0, 0, this.gameWidth, 80); 

                 

                // Time survived 

                const currentTime = this.gameState === 'playing' ? Date.now() : this.gameEndTime; 

                const survivalTime = Math.floor((currentTime - this.gameStartTime) / 1000); 

                 

                this.ctx.fillStyle = '#00FF00'; 

                this.ctx.font = 'bold 18px Arial'; 

                this.ctx.textAlign = 'left'; 

                this.ctx.fillText(`⏱ Time: ${survivalTime}s`, 20, 30); 

                 

                // Distance to exit 

                this.ctx.fillText(`📍 Distance to Exit: ${Math.round(this.distance)}m`, 20, 55); 

                 

                // Speed boost indicator 

                const currentTime2 = Date.now(); 

                if (currentTime2 < this.player.speedBoostEnd) { 

                    const remainingBoost = Math.round((this.player.speedBoostEnd - currentTime2) / 1000 * 10) / 10; 

                    this.ctx.fillStyle = '#FFD700'; 

                    this.ctx.font = 'bold 18px Arial'; 

                    this.ctx.fillText(`⚡ BOOST: ${remainingBoost}s`, 20, 80); 

                } 

                 

                // Collectibles count 

                this.ctx.fillStyle = '#FFD700'; 

                this.ctx.font = '14px Arial'; 

                this.ctx.textAlign = 'right'; 

                this.ctx.fillText(`Stars found: ${5 - this.collectibles.length}/5`, this.gameWidth - 20, 30); 

            } 

             

            drawWinScreen() { 

                // Overlay 

                this.ctx.fillStyle = 'rgba(0, 0, 0, 0.8)'; 

                this.ctx.fillRect(0, 0, this.gameWidth, this.gameHeight); 

                 

                // Victory text 

                this.ctx.fillStyle = '#00FF00'; 

                this.ctx.font = 'bold 60px Arial'; 

                this.ctx.textAlign = 'center'; 

                this.ctx.fillText('🎉 YOU ESCAPED! 🎉', this.gameWidth / 2, this.gameHeight / 2 - 60); 

                 

                // Stats 

                const survivalTime = Math.floor((this.gameEndTime - this.gameStartTime) / 1000); 

                this.ctx.fillStyle = '#FFD700'; 

                this.ctx.font = 'bold 28px Arial'; 

                this.ctx.fillText(`Survived: ${survivalTime} seconds`, this.gameWidth / 2, this.gameHeight / 2 + 30); 

                 

                this.ctx.fillStyle = '#fff'; 

                this.ctx.font = '20px Arial'; 

                this.ctx.fillText('Refresh page to play again', this.gameWidth / 2, this.gameHeight / 2 + 80); 

            } 

             

            drawLoseScreen() { 

                // Overlay 

                this.ctx.fillStyle = 'rgba(0, 0, 0, 0.8)'; 

                this.ctx.fillRect(0, 0, this.gameWidth, this.gameHeight); 

                 

                // Game over text 

                this.ctx.fillStyle = '#FF0000'; 

                this.ctx.font = 'bold 60px Arial'; 

                this.ctx.textAlign = 'center'; 

                this.ctx.fillText('😱 CAUGHT! GAME OVER 😱', this.gameWidth / 2, this.gameHeight / 2 - 60); 

                 

                // Stats 

                const survivalTime = Math.floor((this.gameEndTime - this.gameStartTime) / 1000); 

                this.ctx.fillStyle = '#fff'; 

                this.ctx.font = 'bold 24px Arial'; 

                this.ctx.fillText(`You survived: ${survivalTime} seconds`, this.gameWidth / 2, this.gameHeight / 2 + 30); 

                 

                this.ctx.fillStyle = '#FFD700'; 

                this.ctx.font = '20px Arial'; 

                this.ctx.fillText('Refresh page to try again', this.gameWidth / 2, this.gameHeight / 2 + 80); 

            } 

             

            drawRings() { 

                this.ctx.strokeStyle = '#ff0000'; 

                this.ctx.lineWidth = 4; 

                 

                for (let ring of this.rings) { 

                    this.ctx.beginPath(); 

                    this.ctx.arc(ring.x, ring.y, ring.radius, 0, Math.PI * 2); 

                    this.ctx.stroke(); 

                } 

            } 

             

            drawBackground() { 

                // Create a simple grass pattern 

                this.ctx.fillStyle = '#2ecc71'; 

                this.ctx.fillRect(0, 0, this.gameWidth, this.gameHeight); 

                 

                // Add some texture with darker green dots 

                this.ctx.fillStyle = '#27ae60'; 

                for (let x = 0; x < this.gameWidth; x += 20) { 

                    for (let y = 0; y < this.gameHeight; y += 20) { 

                        if (Math.random() > 0.7) { 

                            this.ctx.fillRect(x, y, 2, 2); 

                        } 

                    } 

                } 

            } 

             

            drawPlayer() { 

                if (this.player.imageLoaded && this.player.image.complete) { 

                    // Draw the weasel image 

                    this.ctx.drawImage( 

                        this.player.image, 

                        this.player.x, 

                        this.player.y, 

                        this.player.width, 

                        this.player.height 

                    ); 

                } else { 

                    // Draw placeholder if image not loaded 

                    this.ctx.fillStyle = '#8B4513'; 

                    this.ctx.fillRect(this.player.x, this.player.y, this.player.width, this.player.height); 

                     

                    // Add some basic weasel features 

                    this.ctx.fillStyle = '#654321'; 

                    this.ctx.fillRect(this.player.x + 5, this.player.y + 5, 54, 54); 

                     

                    // Eyes 

                    this.ctx.fillStyle = '#000'; 

                    this.ctx.fillRect(this.player.x + 15, this.player.y + 15, 8, 8); 

                    this.ctx.fillRect(this.player.x + 35, this.player.y + 15, 8, 8); 

                     

                    // Nose 

                    this.ctx.fillStyle = '#FF69B4'; 

                    this.ctx.fillRect(this.player.x + 28, this.player.y + 30, 6, 4); 

                     

                    // Label 

                    this.ctx.fillStyle = '#fff'; 

                    this.ctx.font = '12px Arial'; 

                    this.ctx.textAlign = 'center'; 

                } 

            } 

             

            gameLoop() { 

                this.update(); 

                this.draw(); 

                requestAnimationFrame(() => this.gameLoop()); 

            } 

        } 

         

        // Start game when page loads 

        window.addEventListener('load', () => { 

            new HorrorGame(); 

        }); 

    </script> 

</body> 

</html>
